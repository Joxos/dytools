name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Validate cache artifacts are not committed
        run: |
          if git ls-files | grep -E '(^|/)__pycache__/|\.pyc$'; then
            echo "Found forbidden cache artifacts tracked in git"
            exit 1
          fi

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright dycap/src dyproto/src dystat/src

      - name: Tests
        run: uv run pytest
